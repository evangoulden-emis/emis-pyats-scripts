version: "3.7"
services:
  device_backup:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      LOGFILE: /logs/logfile.log
    networks:
      - host
    volumes:
      - /var/network_backup_app/backups:/network_backups
      - /var/network_backup_app/logs:/logs

networks:
  host:
    name: host
    external: true


